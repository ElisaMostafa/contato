<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fale Conosco no WhatsApp</title>
  <meta name="description" content="Clique para receber mais informações diretamente no WhatsApp.">

  <script>
    function redirectToSecondLink() {
      // Defina o segundo link aqui
      var secondLink = 'https://example.com/second-link';
      window.location.replace(secondLink);
    }

    function checkTimeAndRedirect() {
      // Obter a hora atual
      var currentTime = new Date().getHours();

      // Definir o horário de redirecionamento (20h)
      var redirectionTime = 20;

      // Verificar se é após o horário de redirecionamento
      if (currentTime >= redirectionTime) {
        redirectToSecondLink();
      }
    }

    // Verificar a hora e redirecionar, se necessário, quando a página for carregada
    window.onload = checkTimeAndRedirect;
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: #333;
    }

    .container {
      max-width: 400px;
      padding: 20px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 15px 25px;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      background-color: #25D366;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #1ebe5d;
    }

    footer {
      margin-top: 30px;
      font-size: 12px;
      color: #777;
    }
  </style>

</head>
<body>

  <div class="container">
    <h1>Receba mais informações pelo WhatsApp</h1>
    <p>Clique no botão abaixo para falar com nossa equipe e saber mais.</p>

    <a class="btn" 
       href="https://chat.whatsapp.com/IdAqIvHrefX4ew53SA9m0c" 
       target="_blank">
       Falar no WhatsApp
    </a>

    <footer>
      <p>© 2026 Todos os direitos reservados</p>
    </footer>
  </div>

</body>
</html>
